<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shagunn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow-x:hidden;
}

.hero{
    height:100vh;
    background:url("1000226403.jpg") center center/cover no-repeat;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,192,203,0.35);
    backdrop-filter:blur(2px);
}

.content{
    position:relative;
    z-index:2;
    max-width:800px;
    padding:25px;
}

h1{
    color:#ffffff;
    font-size:65px;
    margin-bottom:15px;
    text-shadow:0 0 20px #ffb6c1;
}

p{
    color:#ffffff;
    font-size:20px;
    line-height:1.8;
    margin-bottom:30px;
    text-shadow:0 0 10px rgba(0,0,0,0.5);
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.btn{
    text-decoration:none;
    padding:15px 35px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
}

.call{
    background:#ffffff;
    color:#ff69b4;
    box-shadow:0 0 15px rgba(255,255,255,.7);
}

.whatsapp{
    background:#ffb6c1;
    color:white;
    box-shadow:0 0 15px rgba(255,182,193,.8);
}

.footer{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    z-index:2;
    font-size:14px;
    text-shadow:0 0 10px black;
}

@media(max-width:768px){

    h1{
        font-size:45px;
    }

    p{
        font-size:17px;
    }

    .btn{
        width:230px;
    }
}
</style>

</head>
<body>

<section class="hero">

    <div class="content">

        <h1>🌸 Shagunn 🌸</h1>

        <p>
            Welcome to Shagunn's official page.
            Contact anytime through Call or WhatsApp.
        </p>

        <div class="buttons">

            <a href="tel:+919927052221" class="btn call">
                📞 Call Now
            </a>

            <a href="https://wa.me/919927052221" target="_blank" class="btn whatsapp">
                💬 WhatsApp
            </a>

        </div>

    </div>

    <div class="footer">
        © Shagunn
    </div>

</section>

</body>
</html>
